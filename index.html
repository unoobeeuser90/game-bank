<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>🎲 Игровой банк</title>

<style>

body{
    font-family:Arial,sans-serif;
    text-align:center;
    padding-top:40px;
    background:#111827;
    color:white;
}


h1{
    color:#fbbf24;
}


#balance{
    color:#22c55e;
    font-size:28px;
}


button{

    font-size:20px;
    padding:12px 25px;
    margin:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;

}


.reset{

    background:#ef4444;
    color:white;

}


.menu-btn{

    display:inline-block;
    margin-top:30px;
    padding:15px 30px;
    background:#f59e0b;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;

}


input{

    font-size:20px;
    padding:10px;
    border-radius:8px;

}


</style>

</head>


<body>


<h1>🎲 Игровой банк</h1>


<h2 id="balance">
💰 Баланс: 0 ₽
</h2>



<p id="message"></p>



<hr>



<h3>🔐 Ведущий</h3>


<input 
id="password"
type="password"
placeholder="Пароль">



<br>



<button class="reset" onclick="resetBank()">

♻️ Сбросить баланс

</button>




<br>


<a href="restaurant.html" class="menu-btn">

🍽 Ресторан

</a>




<script>


const START_BALANCE = 10000;


const PASSWORD = "1234";




// Создание баланса при первом запуске

function loadBalance(){


    let balance =
    localStorage.getItem("balance");



    if(balance === null){


        balance = START_BALANCE;



        localStorage.setItem(
            "balance",
            balance
        );

    }



    return Number(balance);


}




function showBalance(){


    let balance =
    loadBalance();



    document.getElementById("balance").innerHTML =

    "💰 Баланс: "
    +
    balance
    +
    " ₽";


}



showBalance();





// Сброс баланса

function resetBank(){



    let pass =
    document.getElementById("password").value;



    if(pass === PASSWORD){



        localStorage.setItem(

            "balance",

            START_BALANCE

        );



        showBalance();



        document.getElementById("message").innerHTML =

        "♻️ Баланс восстановлен";



    }else{



        document.getElementById("message").innerHTML =

        "❌ Неверный пароль";


    }


}




// Обновление после ресторана

window.addEventListener(
"focus",
showBalance
);



</script>


</body>

</html>
