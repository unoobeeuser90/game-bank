<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игровой банк</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 40px;
    background: #f5f5f5;
}

input {
    font-size: 20px;
    padding: 10px;
}

button {
    font-size: 22px;
    padding: 12px 25px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.menu-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#f59e0b;
    color:black;
    text-decoration:none;
    font-size:22px;
    border-radius:10px;
    font-weight:bold;
}

.menu-btn:hover{
    background:#FFD700;
}
</style>

</head>
<body>

<h1>🎲 Игровой банк</h1>

<h2 id="balance"></h2>

<p id="message"></p>

<hr>

<h3>🔐 Ведущий</h3>

<input id="password" type="password" placeholder="Пароль">

<br>

<button onclick="resetBank()">
Сбросить баланс
</button>

<br><br>

<a href="restaurant.html" class="menu-btn">
🍽 Ресторан
</a>

<script>

const START_BALANCE = 10000;
const PASSWORD = "1234";

let balance = Number(localStorage.getItem("balance"));

if (isNaN(balance)) {
    balance = START_BALANCE;
    localStorage.setItem("balance", balance);
}

showBalance();

function showBalance() {
    balance = Number(localStorage.getItem("balance")) || START_BALANCE;
    document.getElementById("balance").innerHTML = "💰 Баланс: " + balance + " ₽";
}

function resetBank() {

    let pass = document.getElementById("password").value;

    if (pass === PASSWORD) {

        balance = START_BALANCE;

        localStorage.setItem("balance", balance);

        showBalance();

        document.getElementById("message").innerHTML =
        "♻️ Баланс восстановлен";

    } else {

        document.getElementById("message").innerHTML =
        "❌ Неверный пароль";

    }
}

window.addEventListener("focus", showBalance);

</script>

</body>
</html>
