<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Игровой банк</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding-top: 40px;
}

button {
    font-size: 22px;
    padding: 12px 25px;
    margin: 10px;
    border-radius: 10px;
}

input {
    font-size: 20px;
    padding: 10px;
}
</style>

</head>

<body>

<h1>🎲 Игровой банк</h1>

<h2 id="balance"></h2>

<button onclick="takeMoney()">
Снять 1000
</button>

<p id="message"></p>

<hr>

<h3>🔐 Ведущий</h3>

<input id="password" type="password" placeholder="Пароль">

<br>

<button onclick="resetBank()">
Сбросить баланс
</button>


<script>

const START_BALANCE = 10000;
const PASSWORD = "1234"; // поменяй пароль здесь

let balance = localStorage.getItem("balance");

if(balance === null){
    balance = START_BALANCE;
}

balance = Number(balance);

showBalance();


function showBalance(){

document.getElementById("balance").innerHTML =
"💰 Баланс: " + balance;

}


function takeMoney(){

if(balance >= 1000){

balance -= 1000;

localStorage.setItem("balance", balance);

showBalance();

document.getElementById("message").innerHTML =
"✅ Списано 1000";

}

else{

document.getElementById("message").innerHTML =
"❌ Баланс пуст";

}

}


function resetBank(){

let pass =
document.getElementById("password").value;


if(pass === PASSWORD){

balance = START_BALANCE;

localStorage.setItem("balance", balance);

showBalance();

document.getElementById("message").innerHTML =
"♻️ Баланс восстановлен";

}

else{

document.getElementById("message").innerHTML =
"❌ Неверный пароль";

}

}

</script>

</body>
</html>

    🍽 Ресторан
