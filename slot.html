<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🎰 Однорукий бандит</title>

<style>
body{
    background:#111827;
    color:white;
    text-align:center;
    font-family:Arial;
}

#slots{
    font-size:70px;
    margin:30px;
}

button{
    font-size:22px;
    padding:12px 30px;
}

input{
    font-size:20px;
    width:120px;
}
</style>
</head>
<body>

<h1>🎰 Однорукий бандит</h1>

<h2 id="balance"></h2>

<p>
Ставка:
<input id="bet" type="number" value="100" min="1">
</p>

<div id="slots">🍒 🍋 🍇</div>

<button onclick="spin()">Крутить</button>

<p id="result"></p>

<script>

function getBalance(){
    return Number(localStorage.getItem("balance") || 10000);
}

function setBalance(value){
    localStorage.setItem("balance", value);
}

function showBalance(){
    document.getElementById("balance").innerHTML =
        "💰 Баланс: " + getBalance() + " ₽";
}

showBalance();

const symbols = ["🍒","🍋","🍇","⭐","7️⃣"];

function randomSymbol(){
    return symbols[Math.floor(Math.random()*symbols.length)];
}

function spin(){

    let bet = Number(document.getElementById("bet").value);
    let balance = getBalance();

    if(bet <= 0){
        alert("Введите ставку");
        return;
    }

    if(balance < bet){
        alert("Недостаточно денег!");
        return;
    }

    // снимаем ставку
    balance -= bet;

    let a = randomSymbol();
    let b = randomSymbol();
    let c = randomSymbol();

    document.getElementById("slots").innerHTML =
        a + " " + b + " " + c;

    if(a === b && b === c){
        let win = bet * 5;
        balance += win;

        document.getElementById("result").innerHTML =
            "🎉 Джекпот! +" + win + " ₽";
    }
    else if(a === b || b === c || a === c){
        let win = bet * 2;
        balance += win;

        document.getElementById("result").innerHTML =
            "😊 Выигрыш +" + win + " ₽";
    }
    else{
        document.getElementById("result").innerHTML =
            "😢 Проигрыш -" + bet + " ₽";
    }

    setBalance(balance);
    showBalance();
}

</script>

</body>
</html>
